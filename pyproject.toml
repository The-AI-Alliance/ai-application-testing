[project]
name = "ai_application_testing"
version = "0.5.0"
description = "Code and documentation for the AI Alliance user guide and tools for 'Testing Generative AI Agent Applications'."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "gnureadline>=8.3.3",
    "hypothesis>=6.151.13",
    "levenshtein>=0.27.3",
    "litellm>=1.83.0",
    "fastmcp>=0.1.0",
    "openai>=2.26.0",
    "rich>=14.3.3",
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "pytest>=8.0.0",
    "httpx>=0.27.0",
    "deepagents>=0.5.0",
    "langchain-ollama>=1.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = [
  "setuptools >= 40.9.0",
]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "ty>=0.0.27",
]

[tool.ty.src]
include = ["src"]
exclude = ["src/tools/langflow"]
