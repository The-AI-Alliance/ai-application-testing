[project]
name = "ai_application_testing"
version = "0.5.0"
description = "Code and documentation for the AI Alliance user guide and tools for 'Testing Generative AI Agent Applications'."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "gnureadline>=8.3.3",
    "rich>=15.0.0",
    "fastapi>=0.136.1",
    "uvicorn>=0.48.0",
    "httpx>=0.28.1",
    "deepagents>=0.6.2",
    "langchain-ollama>=1.1.0",
    "openai>=2.36.0",
    "litellm>=1.85.0",
    "levenshtein>=0.27.3",
    "fastmcp>=3.3.1",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = [
  "setuptools>=82.0.1",
]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
dev = [
    "hypothesis>=6.152.8",
    "pytest>=9.0.3",
    "pylint>=4.0.5",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "ty>=0.0.39",
]

[tool.ty.src]
include = ["src"]
exclude = ["src/tools/langflow"]
