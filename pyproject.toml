[project]
name = "ai_application_testing"
version = "0.5.0"
description = "Code and documentation for the AI Alliance user guide and tools for 'Testing Generative AI Agent Applications'."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "gnureadline>=8.3.3",
    "hypothesis>=6.152.3",
    "levenshtein>=0.27.3",
    "litellm>=1.83.14",
    "fastmcp>=3.2.4",
    "openai>=2.32.0",
    "rich>=15.0.0",
    "fastapi>=0.136.1",
    "uvicorn>=0.46.0",
    "pytest>=9.0.3",
    "httpx>=0.28.1",
    "deepagents>=0.5.3",
    "langchain-ollama>=1.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = [
  "setuptools>=82.0.1",
]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "ty>=0.0.34",
]

[tool.ty.src]
include = ["src"]
exclude = ["src/tools/langflow"]
