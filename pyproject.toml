[project]
name = "ai-application-testing"
version = "0.5.0"
description = "Code and documentation for the AI Alliance user guide and tools for 'Testing Generative AI Agent Applications'."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "gnureadline>=8.3.3",
    "hypothesis>=6.151.9",
    "levenshtein>=0.27.3",
    "litellm>=1.76.2",
    "openai>=1.106.1",
]

[tool.setuptools.packages.find]
where = ["src"]
